---
# Phase 7: Automatic Security Updates

# Fedora (dnf5-automatic)
- name: Swap libcurl-minimal for libcurl-full (required by dnf5-plugin-automatic)
  ansible.builtin.command: dnf swap -y libcurl-minimal libcurl-full
  register: curl_swap
  changed_when: "'Complete' in curl_swap.stdout or 'Complete' in curl_swap.stderr"
  failed_when: curl_swap.rc != 0 and 'already installed' not in curl_swap.stderr and 'No match' not in curl_swap.stdout
  when: ansible_os_family == 'RedHat'

- name: Install dnf5 automatic plugin
  ansible.builtin.dnf:
    name: dnf5-plugin-automatic
    state: present
  when: ansible_os_family == 'RedHat'

- name: Deploy automatic updates configuration (Fedora)
  ansible.builtin.template:
    src: automatic.conf.j2
    dest: /etc/dnf/automatic.conf
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family == 'RedHat'

- name: Enable automatic updates timer (Fedora)
  ansible.builtin.systemd:
    name: dnf5-automatic.timer
    state: started
    enabled: true
  when: ansible_os_family == 'RedHat'

# Debian (unattended-upgrades)
- name: Install unattended-upgrades (Debian)
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: true
  when: ansible_os_family == 'Debian'

- name: Configure unattended-upgrades for security only
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family == 'Debian'

- name: Enable automatic updates (Debian)
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  when: ansible_os_family == 'Debian'
