---
# Firewall hardening for Debian/Raspbian (iptables-persistent)
# Preserves Docker container port mappings while hardening host access

- name: Install iptables-persistent
  ansible.builtin.apt:
    name:
      - iptables-persistent
      - netfilter-persistent
    state: present
    update_cache: true

- name: Deploy iptables rules (IPv4)
  ansible.builtin.template:
    src: iptables-rules.v4.j2
    dest: /etc/iptables/rules.v4
    owner: root
    group: root
    mode: "0600"
  notify: Restore iptables rules

- name: Deploy iptables rules (IPv6)
  ansible.builtin.template:
    src: iptables-rules.v6.j2
    dest: /etc/iptables/rules.v6
    owner: root
    group: root
    mode: "0600"
  notify: Restore ip6tables rules

- name: Enable netfilter-persistent service
  ansible.builtin.systemd:
    name: netfilter-persistent
    enabled: true
