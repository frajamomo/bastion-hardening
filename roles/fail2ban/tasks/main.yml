---
# Phase 5: Intrusion Prevention (fail2ban)

- name: Install fail2ban (Fedora)
  ansible.builtin.dnf:
    name:
      - fail2ban
      - fail2ban-firewalld
    state: present
  when: ansible_os_family == 'RedHat'

- name: Install fail2ban (Debian)
  ansible.builtin.apt:
    name:
      - fail2ban
    state: present
    update_cache: true
  when: ansible_os_family == 'Debian'

- name: Deploy fail2ban jail configuration
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
